services:
  openclaw:
    image: coollabsio/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_PRIMARY_MODEL=google/gemini-2.5-flash
      - NODE_COMPILE_CACHE=/data/openclaw-compile-cache
      - OPENCLAW_NO_RESPAWN=1
    env_file:
      - .env
    volumes:
      - openclaw-data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  openclaw-data: