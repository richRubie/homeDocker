services:
  certbot:
    image: certbot/dns-cloudflare
    volumes:
      - ./volumes/etc:/etc/letsencrypt
      - ./volumes/logs:/var/log/letsencrypt
      - ./volumes/lib:/var/lib/letsencrypt
      - ../secrets/certbot_credentials:/credentials
      - ../rasperryPiFirstStart/certRefresh.sh:/scripts/certRefresh.sh
      - ../secrets:/secrets
    entrypoint: ""
    command: certonly --non-interactive --dns-cloudflare --dns-cloudflare-credentials /credentials/cred.ini -d *.rubie-todd.uk --agree-tos --email rich.rubie@gmail.com --keep-until-expiring --deploy-hook /scripts/certRefresh.sh
